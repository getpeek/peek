<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peek</title>
  </head>
  <style lang="css">
    html,
    body,
    #root {
      height: 100%;
      width: 100%;
      border-radius: 12px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Painted before the bundle and the JS-injected theme stylesheet load, so a
         fast resize exposes a backing-store region the engine hasn't repainted yet
         — without a background that shows as a white flash. The active theme's
         --pk-bg drives this once loaded (matching whatever theme is set, including
         during resize); the literal is pine's --pk-bg, used only pre-load. */
      background: var(--pk-bg, oklch(11.5% 0.028 280));
    }
  </style>

  <body>
    <div id="root" />
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
